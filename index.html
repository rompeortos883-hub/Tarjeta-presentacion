            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95); /* Blanco con un poco de transparencia */
            width: 100%;
            max-width: 380px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            text-align: center;
            border: 4px solid var(--secondary);
        }

        .header-color {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            height: 90px;
            position: relative;
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            background: white;
            border: 5px solid var(--white);
            border-radius: 50%;
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Esto hace que la foto se ajuste al círculo sin deformarse */
        }

        .content { padding: 70px 25px 30px; }
        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 5px; }
        .subtitle { font-size: 1rem; color: #666; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            gap: 10px;
        }

        .btn-call { background-color: var(--accent); }
        .btn-save { background-color: var(--primary); }

        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .social-icon { width: 45px; height: 45px; border-radius: 50%; transition: transform 0.2s; }
        .social-icon:active { transform: scale(0.9); }
    </style>
</head>
